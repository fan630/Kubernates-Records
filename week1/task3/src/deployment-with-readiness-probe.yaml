apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-server
  labels:
    app: nginx
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.27
        ports:
        - containerPort: 80
        
        # ===========================================
        # 🟡 Readiness Probe（就緒探針）
        # 用途：判斷 Pod 是否準備好接收流量
        # 當檢查失敗時，Pod 會從 Service endpoints 中移除
        # 但 Pod 本身不會重啟，只是暫停接收流量
        # ===========================================
        readinessProbe:
          exec:
            command:
            - cat                           # 執行 cat 命令
            - /tmp/traffic-enabled          # 檢查這個檔案是否存在
          initialDelaySeconds: 5            # 容器啟動後等待 5 秒才開始檢查
          periodSeconds: 5                  # 每 5 秒檢查一次
          timeoutSeconds: 3                 # 單次檢查的超時時間（3秒）
          successThreshold: 1               # 連續成功 1 次就認為就緒
          failureThreshold: 1               # 連續失敗 1 次就認為未就緒
        
        # ===========================================
        # 🔄 Lifecycle（生命周期鉤子）
        # PostStart：容器啟動後立即執行的動作
        # 用途：自動創建流量開關檔案，讓 Pod 初始狀態為可接收流量
        # ===========================================
        lifecycle:
          postStart:                        # 容器啟動後執行
            exec:
              command:
              - /bin/sh                     # 使用 shell
              - -c                          # 執行指令
              - echo "ready" > /tmp/traffic-enabled  # 創建流量開關檔案
        
        # ===========================================
        # 🔴 Liveness Probe（存活探針）
        # 用途：檢查容器是否還活著（沒有卡死或當機）
        # 當檢查失敗時，Kubernetes 會重啟整個容器
        # 這確保 Nginx 服務本身是正常運作的
        # ===========================================
        livenessProbe:
          httpGet:
            path: /                         # 向根路徑發送 HTTP GET 請求
            port: 80                        # 使用 80 端口
          initialDelaySeconds: 30           # 容器啟動後等待 30 秒才開始檢查
          periodSeconds: 10                 # 每 10 秒檢查一次
          timeoutSeconds: 5                 # 單次檢查的超時時間（5秒）
          successThreshold: 1               # 連續成功 1 次就認為存活
          failureThreshold: 3               # 連續失敗 3 次才重啟容器