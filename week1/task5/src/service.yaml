# service.yaml - Kubernetes LoadBalancer Service 配置
# 創建 LoadBalancer 類型的服務，讓外部可以存取 nginx

apiVersion: v1
kind: Service
metadata:
  name: web-server-service
  labels:
    app: nginx
    task: task5-aks-demo
    service-type: loadbalancer
  annotations:
    # Azure 特定的 LoadBalancer 註釋
    service.beta.kubernetes.io/azure-load-balancer-resource-group: ""  # 使用節點資源群組
    service.beta.kubernetes.io/azure-pipe-probe-request-path: "/"
    
    # 負載平衡器的其他配置選項
    service.beta.kubernetes.io/azure-load-balancer-health-probe-num-of-probe: "2"
    service.beta.kubernetes.io/azure-load-balancer-health-probe-interval: "5"
    
    # DNS 標籤（可選）
    service.beta.kubernetes.io/azure-dns-label-name: "task5-nginx-demo"
spec:
  # 服務類型：LoadBalancer
  type: LoadBalancer
  
  # 選擇器：選擇带有 app: nginx 標籤的 Pod
  selector:
    app: nginx
  
  # 端口配置
  ports:
  - name: http
    port: 80          # Service 對外暴露的端口
    targetPort: 80    # 目標 Pod 的端口
    protocol: TCP
  - name: https
    port: 443         # 也預留 HTTPS 端口（可選）
    targetPort: 80    # 目前還是指向 HTTP
    protocol: TCP
  
  # Session affinity（會話親和性）
  sessionAffinity: None
  
  # 外部流量策略
  externalTrafficPolicy: Cluster  # 或 Local（保留來源 IP）
  
  # LoadBalancer 特定配置
  loadBalancerSourceRanges:  # 限制可存取的 IP 範圍（可選，為空表示所有 IP）
  # - "0.0.0.0/0"  # 允許所有 IP

---
# NetworkPolicy - 網路安全策略（可選）
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nginx-network-policy
  labels:
    app: nginx
    task: task5-aks-demo
spec:
  # 套用到有 app: nginx 標籤的 Pod
  podSelector:
    matchLabels:
      app: nginx
  
  # 允許的流量類型
  policyTypes:
  - Ingress
  - Egress
  
  # 入口流量規則
  ingress:
  - from: []  # 允許所有來源的流量
    ports:
    - protocol: TCP
      port: 80
  
  # 出口流量規則  
  egress:
  - to: []  # 允許到所有目的地的流量
    ports:
    - protocol: TCP
      port: 53    # DNS 查詢
    - protocol: UDP  
      port: 53    # DNS 查詢
  - to: []
    ports:
    - protocol: TCP
      port: 443   # HTTPS 流量
  - to: []
    ports:
    - protocol: TCP
      port: 80    # HTTP 流量

---
# HorizontalPodAutoscaler - 水平自動擴展（可選）
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nginx-hpa
  labels:
    app: nginx
    task: task5-aks-demo
spec:
  # 目標 Deployment
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web-server
  
  # 副本數範圍
  minReplicas: 3
  maxReplicas: 10
  
  # 擴展指標
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70  # CPU 使用率超過 70% 時擴展
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80  # 記憶體使用率超過 80% 時擴展
  
  # 擴展行為配置
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50      # 每次最多增加 50% 的 Pod
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10      # 每次最多減少 10% 的 Pod
        periodSeconds: 60